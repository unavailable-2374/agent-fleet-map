<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Fleet Map</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
 background:#f5f6f8;color:#1c2330;line-height:1.5;-webkit-font-smoothing:antialiased}

header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);
 -webkit-backdrop-filter:blur(8px);border-bottom:1px solid #e3e6ea;padding:13px 22px 10px;
 box-shadow:0 1px 10px rgba(20,30,50,.05)}
.htop{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
h1{font-size:16.5px;font-weight:750;display:flex;align-items:center;gap:8px}
h1 .dot{width:11px;height:11px;border-radius:3px;background:linear-gradient(135deg,#1f9d6b,#2b7fd6,#7c5cc4)}
.sub{font-size:12px;color:#7b8694}
.sub b{color:#2b3340;font-weight:700}
.controls{display:flex;gap:8px;margin-top:10px}
#q{flex:1;min-width:200px;padding:9px 13px;border:1px solid #d3d8de;border-radius:9px;font-size:13.5px;
 outline:none;background:#fff}
#q:focus{border-color:#2b7fd6;box-shadow:0 0 0 3px rgba(43,127,214,.12)}
.btn{padding:8px 12px;border:1px solid #d3d8de;background:#fff;border-radius:8px;font-size:12px;
 cursor:pointer;color:#374151;white-space:nowrap}
.btn:hover{background:#eef1f4}
.jump{display:flex;gap:5px;margin-top:9px;overflow-x:auto;padding-bottom:4px;scrollbar-width:thin}
.jump::-webkit-scrollbar{height:5px}
.jump::-webkit-scrollbar-thumb{background:#d3d8de;border-radius:3px}
.jp{flex:none;display:flex;align-items:center;gap:5px;padding:5px 9px;border-radius:7px;font-size:11.5px;
 cursor:pointer;border:1px solid #e6e9ed;background:#fff;font-weight:600;color:#48515e;user-select:none}
.jp:hover{background:#f0f2f5;border-color:#c9cfd6}
.jp .jd{width:8px;height:8px;border-radius:2px;flex:none}
.jp .jc{color:#aab2bd;font-weight:700;font-size:11px}
.legend{font-size:11px;color:#8b95a1;margin-top:8px;display:flex;gap:15px;flex-wrap:wrap}
.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;vertical-align:-1px;margin-right:4px}

main{max-width:1280px;margin:0 auto;padding:15px 22px 90px}

.fam{margin-bottom:8px;border:1px solid #e3e6ea;border-radius:12px;background:#fff;
 box-shadow:0 1px 3px rgba(20,30,50,.04);scroll-margin-top:182px;overflow:hidden}
.fam-h{display:flex;align-items:center;gap:11px;padding:12px 15px;cursor:pointer;user-select:none}
.fam-h:hover{background:#fafbfc}
.fam-car{font-size:10px;color:#b8bfc8;transition:transform .15s;width:9px;text-align:center}
.fam:not(.col) .fam-car{transform:rotate(90deg)}
.fam-bar{width:5px;height:24px;border-radius:3px;flex:none}
.fam-name{font-weight:750;font-size:14px}
.fam-name .px{font-family:ui-monospace,Menlo,monospace;font-size:11px;color:#aab2bd;
 font-weight:600;margin-left:6px}
.fam-cnt{margin-left:auto;display:flex;gap:6px;align-items:center}
.pill{font-size:11px;padding:2.5px 9px;border-radius:20px;font-weight:700;white-space:nowrap}
.pill-b{color:#fff}
.pill-p{background:#eceef1;color:#8b95a1}
.pill-0{background:#f1f3f5;color:#b8bfc8}
.fam.col .fam-body{display:none}
.fam-body{padding:11px 13px 14px;border-top:1px solid #eef0f3;display:grid;
 grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px;align-items:start}

.ag{border:1px solid #e9ebee;border-radius:9px;background:#fcfcfd;transition:box-shadow .12s}
.ag-h{display:flex;align-items:flex-start;gap:8px;padding:9px 11px;cursor:pointer}
.ag-h:hover{background:#f6f8fa}
.ag-main{flex:1;min-width:0}
.ag-name{font-size:12.6px;font-weight:650;font-family:ui-monospace,Menlo,monospace;
 white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ag-role{font-size:11.6px;color:#5b6675;margin-top:3px;
 display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.bdg{font-size:9.7px;padding:2px 6px;border-radius:5px;font-weight:700;letter-spacing:.2px}
.bdg-lead{background:#1f9d6b;color:#fff}
.bdg-k{background:#eef0f3;color:#5b6675}
.bdg-m{background:#f0e9fb;color:#7c5cc4}
.bdg-mc{background:#e7f0fb;color:#2b7fd6}
.bdg-plan{background:#9aa4b0;color:#fff}
.ag-car{font-size:10px;color:#b8bfc8;padding-top:3px;transition:transform .15s}
.ag:not(.col) .ag-car{transform:rotate(90deg)}
.ag.col .ag-det{display:none}
.ag:not(.col){grid-column:1/-1;background:#fff;box-shadow:0 3px 12px rgba(20,30,50,.09);border-color:#d0d6dd}
.ag:not(.col) .ag-name{white-space:normal}
.ag:not(.col) .ag-role{-webkit-line-clamp:unset;display:block}
.ag-det{padding:4px 13px 13px;border-top:1px dashed #e8eaee}

.ag.planned{background:#f3f4f6;border-style:dashed;border-color:#d3d8de}
.ag.planned .ag-name{color:#7b8694}
.ag.planned .ag-role{color:#9aa4b0}
.ag.planned:not(.col){background:#fbfbfc}
.ag.planned .ag-h:hover{background:#eef0f2}

.sec{margin-top:10px}
.sec-t{font-size:9.7px;font-weight:800;color:#9aa4b0;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{font-size:11px;padding:3px 8px;border-radius:13px;background:#eef0f3;color:#48515e;cursor:default}
.chip.own{background:#e3f5ec;color:#15784f;font-weight:600;border:1px solid #b6e3cd}
.chip.pri{background:#1f9d6b;color:#fff;font-weight:700}
.tools{font-size:11.3px;color:#6b7280;font-family:ui-monospace,Menlo,monospace;line-height:1.6}
.empty{display:none;text-align:center;padding:60px;color:#9aa4b0;font-size:14px}
mark{background:#ffe08a;border-radius:2px;padding:0 1px}
footer{text-align:center;font-size:11px;color:#aab2bd;padding:24px}
</style>
</head>
<body>
<header>
  <div class="htop">
    <h1><span class="dot"></span>Agent Fleet Map</h1>
    <div class="sub" id="sub"></div>
  </div>
  <div class="controls">
    <input id="q" placeholder="搜索  agent 名 / 角色 / 角色类型 / skill 名 …" autocomplete="off">
    <button class="btn" id="exp">全部展开</button>
    <button class="btn" id="col">全部收起</button>
  </div>
  <div class="jump" id="jump"></div>
  <div class="legend">
    <span><i style="background:linear-gradient(135deg,#1f9d6b,#2b7fd6)"></i>已建 agent(彩色)</span>
    <span><i style="background:#f3f4f6;border:1px dashed #c3c9d0"></i>规划中 · 未实现(灰色虚线)</span>
    <span>点家族条展开/收起 · 点 agent 卡看详情 · 点上方家族标签跳转</span>
  </div>
</header>
<main>
  <div id="tree"></div>
  <div class="empty" id="empty">没有匹配的 agent</div>
</main>
<footer>由 routines/build-agent-map.py 生成 · 数据源 agents/ + skills/ + commands/ + docs/planned-agents.json</footer>

ies. Use under rs-spectral-index-lead-deepseek after optical SR inpu","atac-analysis":"Execute bulk ATAC-seq chromatin accessibility analysis steps. Covers Tn5 shift correction, alignment, BAM filtering, fragment-size QC, peak calling (MACS2/Genrich/HMMRATAC), consensus peakset construc","rnaseq-analysis":"Bulk RNA-seq differential-expression pipeline: QC, alignment, quantification, DE analysis, functional enrichment, biological review. Owner LEAD: bio-rnaseq-lead-deepseek (prefer the lead for full-proj","deconvolution-analysis":"Bulk RNA-seq cell-type deconvolution: estimate cell-type proportions from bulk expression using scRNA reference or signature matrices (MuSiC, CIBERSORT, TIMER, Bisque). Owner LEAD: bio-rnaseq-lead-dee","cellchat-analysis":"Cell-cell communication analysis using CellChat v2: ligand-receptor inference, differential communication between conditions, pathway-level signaling, visualization. Owner LEAD: bio-scrna-lead-deepsee","wgcna-analysis":"WGCNA co-expression network pipeline: normalized expression matrix → hub-gene identification, with bootstrap stability and cross-dataset modulePreservation validation. Owner LEAD: bio-wgcna-lead-deeps","enrichment-analysis":"Gene-set enrichment analysis pipeline: ORA, GSEA, SNP-based enrichment, pathway analysis, visualization, biological review. Owner LEAD: shared utility (prefer the relevant `bio-*-lead-deepseek` inside","clean-code":"Scan a codebase for dead code, quality issues, and style inconsistencies using parallel subagents, then execute approved cleanup. Use when the user wants to remove unused code, fix code quality, or st","report":"Bioinformatics/biostatistics report generator + auditor for data-bound drafts: input inventory, claim ledger, fig-text check, three-round audit. Not for final client packaging (→ deliver-report), skel","prs-analysis":"Polygenic Risk Score (PRS) pipeline: study design, QC, PRS construction (C+T, PRSice-2, LDpred2, PRS-CS/CSx, lassosum2, SBayesR), validation, application, reporting. Owner LEAD: bio-prs-lead-deepseek ","audit-report-bulk-rnaseq":"Audit a Bulk RNA-seq analysis report for data-text consistency, statistical correctness, and biological plausibility. Use when reviewing DESeq2/edgeR/limma-voom reports, checking DEG numbers, enrichme","survival-analysis":"Survival (time-to-event) analysis pipeline: study design, KM analysis, Cox regression, competing risks, advanced methods, diagnostics, clinical review. Owner LEAD: bio-survival-ml-lead-deepseek (prefe","qc-sequencing":"Review FastQC, MultiQC, or fastp QC reports for sequencing data: systematic assessment of read quality, adapter contamination, duplication rates, GC content, sample-level issues. Owner LEAD: shared ut","gwas-analysis":"GWAS pipeline: study design, genotype QC, imputation, association testing, post-processing, visualization, annotation, methodological + biological review. Owner LEAD: bio-gwas-lead-deepseek (prefer th","plan-review":"Design a bioinformatics analysis plan via three specialized subagents (Executor, Reviewer, Expert) with iterative refinement. Use for structured, peer-reviewed analysis protocols. Owner LEAD: shared u","mr-analysis":"Mendelian Randomization (MR) pipeline: data collection, harmonization, IVW + sensitivity analyses (MR-Egger, weighted median/mode, MR-PRESSO), pleiotropy diagnostics, colocalization handoff. Owner LEA","review-rust-bio":"Perform a code review of Rust bioinformatics tools, focusing on correctness (coordinate systems, quality encoding), performance (I/O, memory, parallelism), and reliability. Use when auditing .rs sourc","colocalization":"Colocalization analysis pipeline: study design, data prep, Bayesian colocalization (coloc, coloc.susie, HyPrColoc), alternative methods, visualization, sensitivity analysis, biological review. Owner L","deliver-report":"Final-delivery pipeline for completed analyses: evidence gate → write → figure QC → consistency check → metadata sanitize → package. For client Word/PDF delivery. Not for skeleton-only (→ bio-report-t","meta-analysis":"Meta-analysis pipeline across three tracks — Track A GWAS meta (METAL/GWAMA/MR-MEGA), Track B observational/clinical (PRISMA + metafor + GRADE), Track C transcriptomic rank aggregation (RobustRankAggr","download-citations":"Download NBIB citation files from PubMed for all PMIDs in a reference list, ready for EndNote import. Use when the user has a reference list with PMIDs and wants to batch-download citations. Owner LEA","debug-pipeline":"Systematically diagnose failures in bioinformatics pipelines. Use when a pipeline step errors out, a tool produces unexpected output, or the user provides error logs from SLURM, Snakemake, Nextflow, o","audit-report-scrna-seq":"Audit a scRNA-seq analysis report for data-text consistency, statistical correctness, and biological plausibility. Use when reviewing Seurat/Scanpy reports, checking cell counts, cluster annotations, ","scrna-analysis":"Single-cell RNA-seq pipeline: raw data → biological interpretation, with both Seurat v5 (R) and Scanpy (Python) workflows. Owner LEAD: bio-scrna-lead-deepseek (prefer the lead for full-project QC gate"}}</script>
<script>
const D=JSON.parse(document.getElementById('data').textContent);
const AG=D.agents, SD=D.skillDesc;
const FAM={
 bio  :{n:'生物信息 · bio',     c:'#1f9d6b'},
 neuro:{n:'神经科学 · neuro',   c:'#c2410c'},
 chem :{n:'分析化学 · chem',    c:'#0d9488'},
 mat  :{n:'材料 / 计算化学 · mat', c:'#7c5cc4'},
 geo  :{n:'地球科学 · geo',     c:'#b45309'},
 rs   :{n:'遥感 · rs',          c:'#2b7fd6'},
 phys :{n:'物理 · phys',        c:'#4f46e5'},
 astro:{n:'天文 · astro',       c:'#1e3a8a'},
 mech :{n:'机械工程 · mech',    c:'#475569'},
 elec :{n:'电子电气 · elec',    c:'#a16207'},
 civil:{n:'土木工程 · civil',   c:'#78716c'},
 aero :{n:'航空航天 · aero',    c:'#0369a1'},
 cheng:{n:'化学工程 · cheng',   c:'#65a30d'},
 ml   :{n:'机器学习 / AI · ml', c:'#db2777'},
 swe  :{n:'软件工程 · swe',     c:'#2563eb'},
 sec  :{n:'网络安全 · sec',     c:'#dc2626'},
 stat :{n:'统计 / 数学 · stat', c:'#9333ea'},
 econ :{n:'经济金融 · econ',    c:'#0891b2'},
 soc  :{n:'社会科学 · soc',     c:'#d97706'},
 sci  :{n:'科研写作 · sci',     c:'#d6457f'},
 meta :{n:'元 / 治理 · meta',   c:'#6b7280'},
};
const ORDER=['bio','neuro','chem','mat','geo','rs','phys','astro','mech','elec',
 'civil','aero','cheng','ml','swe','sec','stat','econ','soc','sci','meta'];
const KORD={LEAD:0,reviewer:1,'QC/inspect':2,fetcher:3,'data-prep':4,writing:5,delivery:6,worker:7,meta:8};
const esc=s=>(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const hl=(s,q)=>{s=esc(s);if(!q)return s;
 try{return s.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<mark>$1</mark>')}catch(e){return s}};
const zhname=f=>FAM[f].n.split(' · ')[0];

function chip(sk,cls,q){
 const t=SD[sk]?` title="${esc(SD[sk])}"`:'';
 return `<span class="chip ${cls}"${t}>${hl(sk,q)}</span>`;
}

function match(a,q){
 return a.name.toLowerCase().includes(q)||(a.desc||'').toLowerCase().includes(q)
  ||a.kind.toLowerCase().includes(q)
  ||a.whitelist.some(s=>s.includes(q))||a.owned.some(s=>s.includes(q))||(a.primary||'').includes(q);
}

function agentCard(a,q){
 const famc=FAM[a.family].c;
 let badges,det;
 if(a.planned){
  badges=`<span class="bdg bdg-plan">规划中</span><span class="bdg bdg-k">${a.kind}</span>`;
  det=`<div class="ag-det"><div class="sec"><div class="sec-t">状态</div>`
    +`<div class="tools">尚未实现 —— 规划于 docs/planned-agents.json。`
    +`创建 agents/${esc(a.name)}.md 后重建本地图即自动转为已建(彩色)。</div></div></div>`;
 }else{
  const kc=a.kind==='LEAD'?'bdg-lead':'bdg-k';
  const mb=a.model&&a.model.indexOf('deepseek')>=0?'<span class="bdg bdg-m">DeepSeek</span>':
           (a.model?'<span class="bdg bdg-mc">Claude</span>':'');
  badges=`<span class="bdg ${kc}">${a.kind}</span>${mb}`;
  const pri=a.primary?`<div class="sec"><div class="sec-t">主 skill</div><div class="chips">${chip(a.primary,'pri',q)}</div></div>`:'';
  const ownList=a.owned.filter(s=>s!==a.primary);
  const own=ownList.length?`<div class="sec"><div class="sec-t">拥有 skill 簇 · Owner LEAD ${a.owned.length}</div><div class="chips">${ownList.map(s=>chip(s,'own',q)).join('')}</div></div>`:'';
  const ownSet=new Set(a.owned);
  const wl=a.whitelist.length
   ?`<div class="sec"><div class="sec-t">可调用 skill 白名单 · ${a.whitelist.length}</div><div class="chips">${a.whitelist.map(s=>chip(s,ownSet.has(s)?'own':'',q)).join('')}</div></div>`
   :`<div class="sec"><div class="sec-t">skill</div><div class="tools">无 Skill 工具 — 纯文本 / 元 agent</div></div>`;
  det=`<div class="ag-det">${pri}${own}${wl}<div class="sec"><div class="sec-t">tools</div><div class="tools">${esc(a.tools)||'—'}</div></div></div>`;
 }
 const accent=a.planned?'':` style="border-left:3px solid ${famc}"`;
 return `<div class="ag col${a.planned?' planned':''}" data-n="${esc(a.name)}"${accent}>
   <div class="ag-h">
     <div class="ag-main">
       <div class="ag-name">${hl(a.name,q)}</div>
       <div class="ag-role">${hl(a.desc,q)}</div>
       <div class="badges">${badges}</div>
     </div>
     <span class="ag-car">▸</span>
   </div>
   ${det}
 </div>`;
}

function render(){
 const q=document.getElementById('q').value.trim().toLowerCase();
 const tree=document.getElementById('tree');
 let html='',shown=0;
 ORDER.forEach(f=>{
  let list=AG.filter(a=>a.family===f);
  if(!list.length)return;
  if(q)list=list.filter(a=>match(a,q));
  if(!list.length)return;
  list.sort((x,y)=>((x.planned?1:0)-(y.planned?1:0))
        ||(KORD[x.kind]-KORD[y.kind])||x.name.localeCompare(y.name));
  shown+=list.length;
  const nb=list.filter(a=>!a.planned).length, np=list.length-nb;
  const fc=FAM[f].c;
  const bpill=nb?`<span class="pill pill-b" style="background:${fc}">${nb} 已建</span>`
                :`<span class="pill pill-0">0 已建</span>`;
  const ppill=np?`<span class="pill pill-p">+${np} 规划</span>`:'';
  html+=`<div class="fam${q?'':' col'}" data-f="${f}">
    <div class="fam-h">
      <span class="fam-car">▸</span>
      <span class="fam-bar" style="background:${fc}"></span>
      <span class="fam-name" style="color:${fc}">${zhname(f)}<span class="px">${f}</span></span>
      <span class="fam-cnt">${bpill}${ppill}</span>
    </div>
    <div class="fam-body">${list.map(a=>agentCard(a,q)).join('')}</div>
  </div>`;
 });
 tree.innerHTML=html;
 document.getElementById('empty').style.display=shown?'none':'block';
 bind();
}

function bind(){
 document.querySelectorAll('.fam-h').forEach(h=>h.onclick=()=>h.parentNode.classList.toggle('col'));
 document.querySelectorAll('.ag-h').forEach(h=>h.onclick=()=>h.parentNode.classList.toggle('col'));
}

function jumpTo(f){
 const qel=document.getElementById('q');
 if(qel.value){qel.value='';render();}
 const el=document.querySelector('.fam[data-f="'+f+'"]');
 if(!el)return;
 el.classList.remove('col');
 el.scrollIntoView({behavior:'smooth',block:'start'});
}

function stats(){
 const built=AG.filter(a=>!a.planned),plan=AG.filter(a=>a.planned);
 const leads=built.filter(a=>a.kind==='LEAD').length;
 document.getElementById('sub').innerHTML=
  `<b>${built.length}</b> 已建 · <b>${plan.length}</b> 规划中 · <b>${ORDER.length}</b> 家族 · `
  +`LEAD <b>${leads}</b> / worker <b>${built.length-leads}</b>`;
 const bF={},pF={};
 built.forEach(a=>bF[a.family]=(bF[a.family]||0)+1);
 plan.forEach(a=>pF[a.family]=(pF[a.family]||0)+1);
 document.getElementById('jump').innerHTML=ORDER.map(f=>{
   const b=bF[f]||0,p=pF[f]||0;
   return `<span class="jp" data-f="${f}" title="${esc(zhname(f))}"><span class="jd" style="background:${FAM[f].c}"></span>`
    +`${f}<span class="jc">${b}${p?'+'+p:''}</span></span>`;}).join('');
 document.querySelectorAll('.jp').forEach(c=>c.onclick=()=>jumpTo(c.dataset.f));
}

document.getElementById('q').oninput=render;
document.getElementById('exp').onclick=()=>document.querySelectorAll('.fam').forEach(e=>e.classList.remove('col'));
document.getElementById('col').onclick=()=>{
 document.querySelectorAll('.fam').forEach(e=>e.classList.add('col'));
 document.querySelectorAll('.ag').forEach(e=>e.classList.add('col'));
};
stats();render();
</script>
</body>
</html>
